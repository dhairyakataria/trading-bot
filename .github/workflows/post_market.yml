# =============================================================================
# Post-Market + Weekly Routines
#
# IST = UTC + 5:30  |  India has NO daylight saving — offset is constant
#
# End-of-day  : 15:45 IST = 10:15 UTC, Mon–Fri
# Weekly review: Saturday 10:00 IST = 04:30 UTC
# Universe refresh: Sunday 20:00 IST = 14:30 UTC
# Daily reset  : Midnight IST = 18:30 UTC (previous day)
# =============================================================================
name: Post-Market & Weekly

on:
  schedule:
    - cron: "15 10 * * 1-5"   # 15:45 IST — end-of-day routine
    - cron: "30 4  * * 6"     # Saturday 10:00 IST — weekly review
    - cron: "30 14 * * 0"     # Sunday 20:00 IST — universe refresh
    - cron: "30 18 * * *"     # Midnight IST — daily state reset
  workflow_dispatch:
    inputs:
      routine:
        description: "Which routine to run"
        required: true
        default: "eod"
        type: choice
        options:
          - eod
          - weekly_review
          - universe_refresh
          - daily_reset

jobs:
  post-market:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: data/trading_bot.db
          key: trading-db-${{ runner.os }}
          restore-keys: trading-db-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Install system packages required by lxml / newspaper3k
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libxml2-dev libxslt-dev libjpeg-dev libpng-dev

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << EOF
          ANGEL_ONE_CLIENT_ID=${{ secrets.ANGEL_ONE_CLIENT_ID }}
          ANGEL_ONE_API_KEY=${{ secrets.ANGEL_ONE_API_KEY }}
          ANGEL_ONE_PASSWORD=${{ secrets.ANGEL_ONE_PASSWORD }}
          ANGEL_ONE_TOTP_SECRET=${{ secrets.ANGEL_ONE_TOTP_SECRET }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY=${{ secrets.NVIDIA_API_KEY }}
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          NEWSAPI_API_KEY=${{ secrets.NEWSAPI_API_KEY }}
          SERPAPI_API_KEY=${{ secrets.SERPAPI_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          LOG_LEVEL=DEBUG
          EOF

      # Show current time in UTC and IST (confirms cron fired at the right time)
      - name: Show current time (UTC and IST)
        run: |
          python -c "
          from datetime import datetime, timezone, timedelta
          utc_now = datetime.now(timezone.utc)
          ist_now = utc_now + timedelta(hours=5, minutes=30)
          print('=' * 50)
          print(f'UTC  : {utc_now.strftime(\"%Y-%m-%d %H:%M:%S %Z\")}')
          print(f'IST  : {ist_now.strftime(\"%Y-%m-%d %H:%M:%S IST\")}')
          print(f'Day  : {ist_now.strftime(\"%A\")}')
          print('=' * 50)
          "

      # Determine which routine to run based on cron trigger time (UTC hour)
      - name: Run appropriate routine
        run: |
          mkdir -p logs
          python -c "
          import sys
          from datetime import datetime, timezone, timedelta
          from src.utils.config import get_config
          from src.utils.logger import setup_logging
          setup_logging()
          from src.agents.orchestrator import Orchestrator

          utc_now = datetime.now(timezone.utc)
          ist_now = utc_now + timedelta(hours=5, minutes=30)
          utc_hour = utc_now.hour
          utc_min  = utc_now.minute
          utc_dow  = utc_now.weekday()  # 0=Mon, 6=Sun

          print(f'[POST-MARKET] Starting at IST {ist_now.strftime(\"%H:%M:%S\")} on {ist_now.strftime(\"%A %d-%b-%Y\")}')
          print(f'[POST-MARKET] UTC hour={utc_hour} min={utc_min} dow={utc_dow}')

          o = Orchestrator(get_config())
          routine = '${ROUTINE}'   # from workflow_dispatch input (empty if cron)
          print(f'[POST-MARKET] Routine override from dispatch: \"{routine}\"')

          if routine == 'weekly_review' or (utc_dow == 5 and utc_hour == 4):
              print('[POST-MARKET] Running weekly review (Saturday 10:00 IST)...')
              result = o.run_weekly_review()
          elif routine == 'universe_refresh' or (utc_dow == 6 and utc_hour == 14):
              print('[POST-MARKET] Running universe refresh (Sunday 20:00 IST)...')
              result = o.refresh_universe()
          elif routine == 'daily_reset' or utc_hour == 18:
              print('[POST-MARKET] Running daily reset (00:00 IST)...')
              result = o.reset_daily_state()
          else:
              print('[POST-MARKET] Running end-of-day routine (15:45 IST)...')
              result = o.run_eod_routine()

          print('[POST-MARKET] Result:', result)
          o.shutdown()
          print('[POST-MARKET] Done.')
          " 2>&1 | tee logs/post_market_${{ github.run_id }}.log
        env:
          ROUTINE: ${{ github.event.inputs.routine || '' }}

      - name: Save DB cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/trading_bot.db
          key: trading-db-${{ runner.os }}-${{ github.run_id }}

      # Keep a weekly DB backup as a downloadable artifact
      - name: Upload weekly DB backup
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: db-backup-${{ github.run_number }}-${{ github.run_id }}
          path: data/trading_bot.db
          retention-days: 30

      # Upload logs for monitoring
      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: post-market-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
