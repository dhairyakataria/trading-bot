# =============================================================================
# Pre-Market Routine — runs at 08:00 IST (02:30 UTC) Mon–Fri
# Tasks: universe refresh, morning briefing, Telegram pre-market summary
# =============================================================================
name: Pre-Market Routine

on:
  schedule:
    - cron: "30 2 * * 1-5"   # 02:30 UTC = 08:00 IST, Mon–Fri
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  pre-market:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Restore persisted database from cache ───────────────────────
      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: data/trading_bot.db
          key: trading-db-${{ runner.os }}
          restore-keys: trading-db-

      # ── 3. Setup Python ────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 4. Install dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 5. Write .env from GitHub Secrets ─────────────────────────────
      - name: Create .env
        run: |
          cat > .env << EOF
          ANGEL_ONE_CLIENT_ID=${{ secrets.ANGEL_ONE_CLIENT_ID }}
          ANGEL_ONE_API_KEY=${{ secrets.ANGEL_ONE_API_KEY }}
          ANGEL_ONE_PASSWORD=${{ secrets.ANGEL_ONE_PASSWORD }}
          ANGEL_ONE_TOTP_SECRET=${{ secrets.ANGEL_ONE_TOTP_SECRET }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY=${{ secrets.NVIDIA_API_KEY }}
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          NEWSAPI_API_KEY=${{ secrets.NEWSAPI_API_KEY }}
          SERPAPI_API_KEY=${{ secrets.SERPAPI_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF

      # ── 6. Run pre-market routine ──────────────────────────────────────
      - name: Run pre-market routine
        run: python -c "
          from src.utils.config import get_config
          from src.utils.logger import setup_logging
          setup_logging()
          from src.agents.orchestrator import Orchestrator
          o = Orchestrator(get_config())
          result = o.run_pre_market()
          print('Pre-market result:', result)
          o.shutdown()
          "

      # ── 7. Save updated DB back to cache ──────────────────────────────
      - name: Save DB cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/trading_bot.db
          key: trading-db-${{ runner.os }}-${{ github.run_id }}
