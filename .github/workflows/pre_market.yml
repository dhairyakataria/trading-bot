# =============================================================================
# Pre-Market Routine — runs at 08:00 IST (02:30 UTC) Mon–Fri
# Tasks: universe refresh, morning briefing, Telegram pre-market summary
#
# Data init runs at 09:00 IST (03:30 UTC) — broker check + price caching
#
# IST = UTC + 5:30  |  India has NO daylight saving — offset is constant
# =============================================================================
name: Pre-Market Routine

on:
  schedule:
    - cron: "30 2 * * 1-5"   # 02:30 UTC = 08:00 IST — morning routine
    - cron: "30 3 * * 1-5"   # 03:30 UTC = 09:00 IST — data init buffer
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  pre-market:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Restore persisted database from cache ───────────────────────
      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: data/trading_bot.db
          key: trading-db-${{ runner.os }}
          restore-keys: trading-db-

      # ── 3. Setup Python ────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 4a. Install system packages required by lxml / newspaper3k ────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libxml2-dev libxslt-dev libjpeg-dev libpng-dev

      # ── 4b. Install Python dependencies ────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 5. Write .env from GitHub Secrets ─────────────────────────────
      - name: Create .env
        run: |
          cat > .env << EOF
          ANGEL_ONE_CLIENT_ID=${{ secrets.ANGEL_ONE_CLIENT_ID }}
          ANGEL_ONE_API_KEY=${{ secrets.ANGEL_ONE_API_KEY }}
          ANGEL_ONE_PASSWORD=${{ secrets.ANGEL_ONE_PASSWORD }}
          ANGEL_ONE_TOTP_SECRET=${{ secrets.ANGEL_ONE_TOTP_SECRET }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY=${{ secrets.NVIDIA_API_KEY }}
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          NEWSAPI_API_KEY=${{ secrets.NEWSAPI_API_KEY }}
          SERPAPI_API_KEY=${{ secrets.SERPAPI_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          LOG_LEVEL=DEBUG
          EOF

      # ── 6. Show current time in UTC and IST (for schedule verification) ─
      - name: Show current time (UTC and IST)
        run: |
          python -c "
          from datetime import datetime, timezone, timedelta
          utc_now = datetime.now(timezone.utc)
          ist_now = utc_now + timedelta(hours=5, minutes=30)
          print('=' * 50)
          print(f'UTC  : {utc_now.strftime(\"%Y-%m-%d %H:%M:%S %Z\")}')
          print(f'IST  : {ist_now.strftime(\"%Y-%m-%d %H:%M:%S IST\")}')
          print(f'Day  : {ist_now.strftime(\"%A\")}')
          print('=' * 50)
          "

      # ── 7. Run appropriate routine based on UTC hour ────────────────────
      - name: Run pre-market or data-init routine
        run: |
          mkdir -p logs
          python -c "
          from datetime import datetime, timezone, timedelta
          from src.utils.config import get_config
          from src.utils.logger import setup_logging
          setup_logging()
          from src.agents.orchestrator import Orchestrator

          utc_now = datetime.now(timezone.utc)
          ist_now = utc_now + timedelta(hours=5, minutes=30)
          print(f'[PRE-MARKET] Starting at IST {ist_now.strftime(\"%H:%M:%S\")} on {ist_now.strftime(\"%A %d-%b-%Y\")}')

          o = Orchestrator(get_config())
          utc_hour = utc_now.hour
          if utc_hour >= 3:
              print('[PRE-MARKET] Running data init (09:00 IST)...')
              result = o.run_data_init()
          else:
              print('[PRE-MARKET] Running morning routine (08:00 IST)...')
              result = o.run_pre_market()
          print('[PRE-MARKET] Result:', result)
          o.shutdown()
          print('[PRE-MARKET] Done.')
          " 2>&1 | tee logs/pre_market_${{ github.run_id }}.log

      # ── 8. Save updated DB back to cache ──────────────────────────────
      - name: Save DB cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/trading_bot.db
          key: trading-db-${{ runner.os }}-${{ github.run_id }}

      # ── 9. Upload logs as artifact (always, even on failure) ──────────
      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pre-market-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
